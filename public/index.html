<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SlopSimulacrum - Droid Simulation</title>
    <style>
        :root {
            --neon-green: #00ff00;
            --dark-green: #004400;
            --bg-black: #0a0a0a;
            --panel-bg: #161616;
            --text-main: #fff;
            --text-dim: #aaa;
            --glow: 0 0 10px rgba(0, 255, 0, 0.5);
        }

        body {
            font-family: 'Courier New', Courier, monospace;
            background-color: var(--bg-black);
            color: var(--neon-green);
            margin: 0;
            padding: 20px;
            display: flex;
            flex-direction: column;
            align-items: center;
            overflow-x: hidden;
        }

        h1 {
            text-transform: uppercase;
            letter-spacing: 5px;
            border-bottom: 2px solid var(--neon-green);
            padding-bottom: 10px;
            text-shadow: var(--glow);
            margin-bottom: 30px;
        }

        .main-layout {
            display: grid;
            grid-template-columns: 1fr 350px;
            gap: 20px;
            width: 100%;
            max-width: 1300px;
        }

        .section {
            background: var(--panel-bg);
            border: 1px solid var(--neon-green);
            border-radius: 4px;
            padding: 20px;
            box-shadow: inset 0 0 15px rgba(0, 255, 0, 0.1), 0 0 10px rgba(0, 0, 0, 0.5);
        }

        /* Map Styles */
        .map-container {
            position: relative;
            display: flex;
            justify-content: center;
            align-items: center;
            background: #000;
            border: 1px inset var(--neon-green);
            border-radius: 4px;
            height: 500px;
            overflow: hidden;
        }

        #world-map {
            width: 100%;
            height: 100%;
        }

        .room-node {
            fill: var(--bg-black);
            stroke: var(--neon-green);
            stroke-width: 2;
            transition: all 0.3s;
        }

        .room-node.active {
            fill: var(--dark-green);
            stroke-width: 4;
            filter: drop-shadow(0 0 5px var(--neon-green));
        }

        .connection-line {
            stroke: var(--neon-green);
            stroke-width: 1;
            stroke-dasharray: 5,5;
            opacity: 0.6;
        }

        .room-label {
            fill: var(--text-dim);
            font-size: 12px;
            text-anchor: middle;
            pointer-events: none;
            user-select: none;
        }

        #droid-marker {
            cursor: pointer;
            transition: all 0.5s cubic-bezier(0.4, 0, 0.2, 1);
            filter: drop-shadow(0 0 8px var(--neon-green));
        }

        #droid-marker:hover {
            r: 8;
            fill: #fff;
        }

        /* Control Panel Styles */
        .control-panel {
            display: flex;
            flex-direction: column;
            gap: 20px;
        }

        .room-info {
            text-align: center;
        }

        .room-name {
            font-size: 1.4em;
            color: var(--text-main);
            margin-bottom: 10px;
            text-transform: uppercase;
        }

        .room-desc {
            font-style: italic;
            color: var(--text-dim);
            margin-bottom: 20px;
            min-height: 60px;
        }

        .nav-buttons {
            display: flex;
            flex-wrap: wrap;
            justify-content: center;
            gap: 10px;
        }

        .nav-btn {
            background: var(--dark-green);
            color: var(--neon-green);
            border: 1px solid var(--neon-green);
            padding: 8px 16px;
            cursor: pointer;
            font-family: inherit;
            text-transform: uppercase;
            transition: all 0.2s;
        }

        .nav-btn:hover {
            background: var(--neon-green);
            color: var(--bg-black);
            box-shadow: var(--glow);
        }

        /* Detail Panel Overlay */
        #detail-overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.85);
            display: none;
            justify-content: center;
            align-items: center;
            z-index: 100;
            backdrop-filter: blur(4px);
        }

        .detail-card {
            background: var(--panel-bg);
            border: 2px solid var(--neon-green);
            width: 600px;
            max-height: 80vh;
            padding: 30px;
            border-radius: 8px;
            box-shadow: 0 0 30px rgba(0, 255, 0, 0.2);
            overflow-y: auto;
            position: relative;
        }

        .close-btn {
            position: absolute;
            top: 15px;
            right: 15px;
            background: none;
            border: 1px solid var(--neon-green);
            color: var(--neon-green);
            cursor: pointer;
            padding: 5px 10px;
            font-family: inherit;
        }

        .detail-header {
            border-bottom: 1px solid var(--neon-green);
            margin-bottom: 20px;
            padding-bottom: 10px;
        }

        .entity-stat {
            margin-bottom: 10px;
            display: flex;
            gap: 10px;
        }

        .stat-label {
            color: var(--neon-green);
            font-weight: bold;
            min-width: 120px;
        }

        .stat-value {
            color: var(--text-main);
        }

        .component-section {
            margin-top: 20px;
        }

        .component-item {
            background: rgba(0, 255, 0, 0.05);
            border-left: 3px solid var(--neon-green);
            padding: 10px;
            margin-bottom: 10px;
        }

        .component-title {
            color: var(--text-main);
            font-weight: bold;
            margin-bottom: 5px;
            display: flex;
            justify-content: space-between;
        }

        .trait-row {
            font-size: 0.9em;
            margin-left: 10px;
            color: var(--text-dim);
        }

        .trait-name {
            color: var(--neon-green);
        }

        .loading {
            font-style: italic;
            color: var(--text-dim);
            text-align: center;
            margin: 20px;
        }
    </style>
</head>
<body>
    <h1>🤖 SlopSimulacrum Terminal</h1>
    <div id="status" class="loading">Connecting to world state...</div>
    
    <div class="main-layout">
        <!-- Left: Visual Map -->
        <div class="section">
            <h2 style="text-align: center; margin-top: 0;">🛰️ Spatial Map</h2>
            <div class="map-container">
                <svg id="world-map" viewBox="0 0 800 500">
                    <defs>
                        <filter id="glow">
                            <feGaussianBlur stdDeviation="2.5" result="coloredBlur"/>
                            <feMerge>
                                <feMergeNode in="coloredBlur"/>
                                <feMergeNode in="SourceGraphic"/>
                            </feMerge>
                        </filter>
                    </defs>
                    <g id="connections-layer"></g>
                    <g id="rooms-layer"></g>
                    <g id="entities-layer"></g>
                </svg>
            </div>
        </div>

        <!-- Right: Control Console -->
        <div class="section control-panel">
            <div>
                <h2 style="margin-top: 0;">🕹️ Navigation</h2>
                <div class="room-info">
                    <div id="current-room-name" class="room-name">Scanning...</div>
                    <div id="current-room-desc" class="room-desc">Awaiting data...</div>
                    <div id="nav-buttons" class="nav-buttons"></div>
                </div>
            </div>
            <div style="border-top: 1px solid #333; padding-top: 20px; font-size: 0.8em; color: var(--text-dim);">
                SYSTEM STATUS: <span style="color: var(--neon-green)">ONLINE</span><br>
                ACTIVE UNIT: <span id="active-droid-id">None</span>
            </div>
        </div>
    </div>

    <!-- Droid Detail Overlay -->
    <div id="detail-overlay">
        <div class="detail-card">
            <button class="close-btn" onclick="closeDetails()">CLOSE [X]</button>
            <div id="detail-content">
                <!-- Populated by JS -->
            </div>
        </div>
    </div>

    <script>
        // Room layout map for visual representation
        const roomLayout = {
            "The Entrance Hall": { x: 150, y: 250 },
            "The Eastern Corridor": { x: 400, y: 250 },
            "The Deep Vault": { x: 650, y: 250 }
        };

        let currentWorldState = null;
        let activeDroid = null;

        async function fetchWorldState() {
            const statusDiv = document.getElementById('status');
            try {
                const response = await fetch('/world-state');
                if (!response.ok) throw new Error(`HTTP error! status: ${response.status}`);
                
                const data = await response.json();
                currentWorldState = data.state;
                
                statusDiv.style.display = 'none';

                // 1. Identify Primary Droid for Navigation
                activeDroid = Object.values(currentWorldState.entities || {}).find(e => e.blueprint === 'smallBallDroid');
                
                if (currentWorldState.entities && Object.keys(currentWorldState.entities).length > 0) {
                    updateUI();
                } else {
                    document.getElementById('current-room-name').textContent = "No Droid Found";
                    document.getElementById('current-room-desc').textContent = "The simulation is empty.";
                    document.getElementById('nav-buttons').innerHTML = "";
                    document.getElementById('active-droid-id').textContent = "None";
                }

            } catch (error) {
                statusDiv.textContent = 'Connection Error: ' + error.message;
                statusDiv.style.color = 'red';
            }
        }

        function updateUI() {
            const state = currentWorldState;
            const droid = activeDroid;
            const room = state.rooms[droid.location];

            // 1. Update Text Info
            document.getElementById('active-droid-id').textContent = droid.id;
            if (room) {
                document.getElementById('current-room-name').textContent = room.name;
                document.getElementById('current-room-desc').textContent = room.description;
                
                renderNavButtons(room, droid.id);
            }

            // 2. Update Visuals
            renderMap(state.rooms);
            renderEntities(state.entities, state.rooms);
        }

        function renderNavButtons(room, entityId) {
            const navEl = document.getElementById('nav-buttons');
            navEl.innerHTML = '';
            const connections = room.connections || {};
            
            if (Object.keys(connections).length === 0) {
                navEl.innerHTML = '<em style="color: #666">No exits available.</em>';
            } else {
                for (const [door, targetId] of Object.entries(connections)) {
                    const btn = document.createElement('button');
                    btn.className = 'nav-btn';
                    btn.textContent = `Go ${door.replace('_', ' ')}`;
                    btn.onclick = () => moveDroid(entityId, targetId);
                    navEl.appendChild(btn);
                }
            }
        }

        function renderMap(rooms) {
            const roomsLayer = document.getElementById('rooms-layer');
            const connLayer = document.getElementById('connections-layer');
            roomsLayer.innerHTML = '';
            connLayer.innerHTML = '';

            const roomNodes = {};

            // Create Nodes
            for (const [id, room] of Object.entries(rooms)) {
                const coords = roomLayout[room.name] || { x: Math.random() * 600 + 100, y: Math.random() * 300 + 100 };
                roomNodes[id] = coords;

                const group = document.createElementNS("http://www.w3.org/2000/svg", "g");
                
                const circle = document.createElementNS("http://www.w3.org/2000/svg", "circle");
                circle.setAttribute("cx", coords.x);
                circle.setAttribute("cy", coords.y);
                circle.setAttribute("r", 20);
                circle.setAttribute("class", `room-node ${activeDroid && activeDroid.location === id ? 'active' : ''}`);
                
                const text = document.createElementNS("http://www.w3.org/2000/svg", "text");
                text.setAttribute("x", coords.x);
                text.setAttribute("y", coords.y + 35);
                text.setAttribute("class", "room-label");
                text.textContent = room.name;

                group.appendChild(circle);
                group.appendChild(text);
                roomsLayer.appendChild(group);
            }

            // Create Edges
            for (const [id, room] of Object.entries(rooms)) {
                const start = roomNodes[id];
                const connections = room.connections || {};
                for (const [door, targetId] of Object.entries(connections)) {
                    const end = roomNodes[targetId];
                    if (start && end) {
                        const line = document.createElementNS("http://www.w3.org/2000/svg", "line");
                        line.setAttribute("x1", start.x);
                        line.setAttribute("y1", start.y);
                        line.setAttribute("x2", end.x);
                        line.setAttribute("y2", end.y);
                        line.setAttribute("class", "connection-line");
                        connLayer.appendChild(line);
                    }
                }
            }
        }

function renderEntities(entities, rooms) {
    const entitiesLayer = document.getElementById('entities-layer');
    entitiesLayer.innerHTML = '';

    for (const [id, droid] of Object.entries(entities)) {
        const room = rooms[droid.location];
        if (!room) continue;

        const coords = roomLayout[room.name] || { x: 0, y: 0 };
        
        const marker = document.createElementNS("http://www.w3.org/2000/svg", "circle");
        marker.setAttribute("cx", coords.x);
        marker.setAttribute("cy", coords.y);
        marker.setAttribute("r", 6);
        marker.setAttribute("fill", "#00ff00");
        marker.setAttribute("cursor", "pointer");
        marker.setAttribute("filter", "url(#glow)");
        
        marker.onclick = () => showDroidDetails(droid, currentWorldState);
        
        entitiesLayer.appendChild(marker);
    }
}

        function showDroidDetails(droid, state) {
            const overlay = document.getElementById('detail-overlay');
            const content = document.getElementById('detail-content');
            
            let componentsHtml = '';
            if (droid.components && state.components && state.components.instances) {
                componentsHtml = '<div class="component-section"><h3>🛠️ Installed Components</h3>';
                
                droid.components.forEach(comp => {
                    const stats = state.components.instances[comp.id];
                    let statsHtml = '';
                    
                    if (stats) {
                        for (const [traitId, properties] of Object.entries(stats)) {
                            let propsHtml = '';
                            for (const [propKey, propVal] of Object.entries(properties)) {
                                propsHtml += `<span class="trait-stat">${propKey}: ${propVal}</span> `;
                            }
                            statsHtml += `
                                <div class="trait-row">
                                    <span class="trait-name">${traitId}</span>: ${propsHtml}
                                </div>`;
                        }
                    }

                    componentsHtml += `
                        <div class="component-item">
                            <div class="component-title">
                                <span>${comp.type}</span>
                                <span style="font-size: 0.7em; color: #666;">ID: ${comp.identifier}</span>
                            </div>
                            ${statsHtml || '<div class="trait-row">No technical data available.</div>'}
                        </div>`;
                });
                componentsHtml += '</div>';
            }

            content.innerHTML = `
                <div class="detail-header">
                    <h2 style="margin:0; color: var(--neon-green);">Droid Unit Analysis</h2>
                    <p style="color: var(--text-dim); margin: 5px 0 0 0;">Analyzing internal systems...</p>
                </div>
                <div class="entity-stat">
                    <span class="stat-label">Unit ID:</span>
                    <span class="stat-value">${droid.id}</span>
                </div>
                <div class="entity-stat">
                    <span class="stat-label">Blueprint:</span>
                    <span class="stat-value">${droid.blueprint}</span>
                </div>
                <div class="entity-stat">
                    <span class="stat-label">Current Zone:</span>
                    <span class="stat-value">${state.rooms[droid.location]?.name || 'Unknown'}</span>
                </div>
                ${componentsHtml}
            `;

            overlay.style.display = 'flex';
        }

        function closeDetails() {
            document.getElementById('detail-overlay').style.display = 'none';
        }

        async function moveDroid(entityId, targetRoomId) {
            try {
                const response = await fetch('/move-entity', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ entityId, targetRoomId })
                });

                if (!response.ok) {
                    const err = await response.json();
                    throw new Error(err.error || 'Failed to move droid');
                }

                fetchWorldState();
            } catch (error) {
                alert('System Error: ' + error.message);
            }
        }

        // Initial load
        fetchWorldState();
        // Poll for updates every 3 seconds to keep map synced
        setInterval(fetchWorldState, 3000);
    </script>
</body>
</html>
