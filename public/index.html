<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SlopSimulacrum - Droid Simulation</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <h1>🤖 SlopSimulacrum Terminal</h1>
    <div id="status" class="loading">Connecting to world state...</div>
    
    <div class="main-layout">
        <!-- Left: Visual Map -->
        <div class="section">
            <div class="room-header">
                <h2 style="margin: 0;">🛰️ Spatial Map</h2>
                <span id="current-room-coords" style="color: #666; font-size: 0.8em;"></span>
            </div>
            <div class="map-container">
                <svg id="world-map" viewBox="0 0 800 500">
                    <defs>
                        <filter id="glow">
                            <feGaussianBlur stdDeviation="2.5" result="coloredBlur"/>
                            <feMerge>
                                <feMergeNode in="coloredBlur"/>
                                <feMergeNode in="SourceGraphic"/>
                            </feMerge>
                        </filter>
                    </defs>
                    <g id="room-layer"></g>
                    <g id="entities-layer"></g>
                    <g id="components-layer"></g>
                </svg>
            </div>
        </div>

        <!-- Right: Control Console -->
        <div class="section control-panel">
            <div>
                <h2 style="margin-top: 0;">🕹️ Navigation</h2>
                <div class="room-info">
                    <div id="current-room-name" class="room-name">Scanning...</div>
                    <div id="current-room-desc" class="room-desc">Awaiting data...</div>
                    <div id="nav-buttons" class="nav-buttons"></div>
                </div>
            </div>
            <div style="border-top: 1px solid #333; padding-top: 20px; font-size: 0.8em; color: var(--text-dim);">
                SYSTEM STATUS: <span style="color: var(--neon-green)">ONLINE</span><br>
                ACTIVE UNIT: <span id="active-droid-id">None</span>
            </div>
            <div class="action-section">
                <h2 style="margin-top: 0;">⚔️ Action Registry</h2>
                <div class="action-list" id="action-list">
                    <em style="color: #666;">Loading action data...</em>
                </div>
            </div>
        </div>
    </div>

    <!-- Droid Detail Overlay -->
    <div id="detail-overlay" class="detail-overlay">
        <div class="detail-card">
            <button id="close-details-btn" class="close-btn">CLOSE [X]</button>
            <div id="detail-content">
                <!-- Populated by JS -->
            </div>
        </div>
    </div>

    <script src="/socket.io/socket.io.js"></script>
    <script type="module" src="js/App.js"></script>
</body>
</html>
